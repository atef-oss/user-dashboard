name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run a simple command
        run: |
          echo "Hello, World!"

      - name: Build and test
        run: |
          echo "Building and testing..."
          npm install
          npm run build
          npm test